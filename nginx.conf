# MyOwnCloud Nginx Configuration
# Include this in the main server block or use as a separate server block

location /myowncloud {
    alias /var/www/html/myowncloud;
    index index.php;

    # Allow larger file uploads
    client_max_body_size 100M;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        include fastcgi_params;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block access to sensitive files
    location ~* /(config\.php|includes|cron|schema\.sql|error\.log|vendor|\.env) {
        deny all;
        return 404;
    }
}
